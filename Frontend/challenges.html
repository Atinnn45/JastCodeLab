<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tantangan — JastCodeLab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
    :root {
      --bg:#080c14;--bg2:#0d1220;--bg3:#111827;--bgcard:#111827;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
      --blue:#4f8ef7;--green:#34d399;--orange:#fb923c;--purple:#a78bfa;
      --red:#f87171;--yellow:#fbbf24;
      --txt:#e8edf8;--txt2:#8b95b0;--txt3:#4a5472;
      --fn-display:'Syne',sans-serif;--fn-mono:'JetBrains Mono',monospace;
      --fn-body:'DM Sans',sans-serif;--t:.18s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--txt);font-family:var(--fn-body);font-size:15px;line-height:1.6;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    ul{list-style:none}
    button{font-family:var(--fn-body)}

    /* ══════════════════════════════════════════
       SIDEBAR — identik dengan index.html
    ══════════════════════════════════════════ */
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;display:none;backdrop-filter:blur(2px);}
    .sidebar-overlay.show{display:block;}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:300;transition:transform .28s cubic-bezier(.4,0,.2,1);}
    .sidebar.hidden{transform:translateX(-100%);}
    .main-area{margin-left:220px;transition:margin .28s cubic-bezier(.4,0,.2,1);}
    .main-area.full{margin-left:0;}
    .sb-logo{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .sb-logo-link{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--fn-mono);font-size:11px;font-weight:700;color:#fff;}
    .logo-text{font-family:var(--fn-display);font-size:15px;font-weight:800;color:var(--txt);letter-spacing:-.3px;}
    .close-btn{background:none;border:none;cursor:pointer;color:var(--txt3);padding:4px;border-radius:5px;display:none;}
    .close-btn:hover{color:var(--txt);background:rgba(255,255,255,.07);}
    .sb-nav{flex:1;padding:10px;overflow-y:auto;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;color:var(--txt2);transition:all .15s;text-decoration:none;margin-bottom:2px;border:1px solid transparent;}
    .nav-item:hover{background:rgba(255,255,255,.05);color:var(--txt);}
    .nav-item.active{background:rgba(79,142,247,.12);color:var(--blue);border-color:rgba(79,142,247,.25);}
    .nav-item svg{width:18px;height:18px;flex-shrink:0;}
    .nav-divider{height:1px;background:var(--border);margin:6px 4px;}
    .sb-bottom{padding:10px;border-top:1px solid var(--border);flex-shrink:0;}
    .streak-wrap{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.18);margin-bottom:6px;}
    .streak-days{font-family:var(--fn-display);font-size:14px;font-weight:800;color:var(--orange);line-height:1;}
    .streak-lbl{font-size:10px;color:var(--txt3);font-family:var(--fn-mono);}
    .sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:6px;}
    .sb-user:hover{background:rgba(255,255,255,.05);}
    .avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
    .sb-username{font-size:13px;font-weight:500;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-danger-sm{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;width:100%;transition:all .15s;}
    .btn-danger-sm:hover{background:rgba(248,113,113,.22);}

    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;height:54px;background:rgba(8,12,20,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100;}
    .topbar-title{font-size:14px;color:var(--txt2);flex:1;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .xp-badge{font-family:var(--fn-mono);font-size:11px;padding:4px 12px;border-radius:100px;background:rgba(79,142,247,.12);color:var(--blue);border:1px solid rgba(79,142,247,.2);}
    .coins-badge{font-family:var(--fn-mono);font-size:11px;padding:4px 12px;border-radius:100px;background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25);}
    .menu-toggle{background:none;border:none;cursor:pointer;color:var(--txt2);padding:6px;border-radius:7px;display:flex;align-items:center;transition:all var(--t);}
    .menu-toggle:hover{background:rgba(255,255,255,.07);color:var(--txt);}

    /* ── CHALLENGES ── */
    .page{display:grid;grid-template-columns:340px 1fr;gap:0;min-height:calc(100vh - 54px);}
    .challenge-list{border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 54px);position:sticky;top:54px;}
    .challenge-detail{padding:28px;overflow-y:auto;}
    .list-header{padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
    .list-title{font-family:var(--fn-display);font-size:15px;font-weight:700;margin-bottom:10px;}
    .filter-tabs{display:flex;gap:4px;}
    .ftab{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--txt3);font-size:11px;padding:4px 10px;cursor:pointer;font-family:var(--fn-mono);transition:all .15s;}
    .ftab:hover{color:var(--txt);border-color:var(--border2);}
    .ftab.active{background:rgba(79,142,247,.12);color:var(--blue);border-color:rgba(79,142,247,.3);}
    .ftab.f-mudah.active{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.3);}
    .ftab.f-menengah.active{background:rgba(251,146,60,.1);color:var(--orange);border-color:rgba(251,146,60,.3);}
    .ftab.f-sulit.active{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.3);}
    .ch-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;}
    .ch-item:hover{background:rgba(255,255,255,.03);}
    .ch-item.active{background:rgba(79,142,247,.08);border-left:3px solid var(--blue);}
    .ch-item.selesai .ch-icon{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.35);}
    .ch-icon{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(255,255,255,.03);}
    .ch-info{flex:1;min-width:0;}
    .ch-title{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
    .ch-meta{display:flex;align-items:center;gap:6px;}
    .ch-xp{font-family:var(--fn-mono);font-size:10px;color:var(--txt3);}
    .check-mark{width:18px;height:18px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--txt3);text-align:center;padding:40px;}
    .detail-empty-icon{font-size:3rem;margin-bottom:12px;opacity:.5;}
    .detail-header{margin-bottom:22px;}
    .detail-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
    .detail-title{font-family:var(--fn-display);font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px;}
    .detail-desc{font-size:14px;color:var(--txt2);line-height:1.7;margin-bottom:18px;}
    .io-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .io-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .io-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);padding:6px 12px;border-bottom:1px solid var(--border);font-family:var(--fn-mono);}
    .io-box pre{padding:10px 12px;font-family:var(--fn-mono);font-size:12px;color:var(--txt2);overflow-x:auto;}
    .editor-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
    .editor-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
    .editor-hdr-left{font-family:var(--fn-mono);font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:6px;}
    .editor-dots{display:flex;gap:5px;}
    .editor-dot{width:10px;height:10px;border-radius:50%;}
    .code-editor{display:block;width:100%;min-height:200px;background:#050a10;color:var(--txt);font-family:var(--fn-mono);font-size:13px;line-height:1.7;padding:14px;border:none;outline:none;resize:vertical;}
    .output-section{background:rgba(0,0,0,.3);border-top:1px solid var(--border);padding:12px 14px;}
    .output-lbl{font-size:10px;color:var(--txt3);font-family:var(--fn-mono);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
    .output-content{font-family:var(--fn-mono);font-size:12px;color:var(--txt2);white-space:pre-wrap;word-break:break-all;min-height:36px;}
    .action-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .btn-run{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3);border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;}
    .btn-run:hover{background:rgba(52,211,153,.25);}
    .btn-run:disabled{opacity:.4;cursor:not-allowed;}
    .btn-submit{background:linear-gradient(135deg,var(--blue),#6a3de8);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,142,247,.3);}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .btn-reset{background:transparent;color:var(--txt3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer;transition:all .15s;}
    .btn-reset:hover{color:var(--txt);border-color:var(--border2);}
    .waktu-info{font-family:var(--fn-mono);font-size:11px;color:var(--txt3);margin-left:auto;}
    .selesai-banner{background:linear-gradient(135deg,rgba(52,211,153,.1),rgba(52,211,153,.05));border:1px solid rgba(52,211,153,.3);border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
    .selesai-icon{font-size:2rem;}
    .selesai-title{font-family:var(--fn-display);font-size:15px;font-weight:700;color:var(--green);}
    .selesai-sub{font-size:12px;color:var(--txt2);}
    .locked-banner{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:28px;text-align:center;margin-top:20px;}
    .locked-icon{font-size:2.5rem;margin-bottom:10px;}
    .locked-title{font-family:var(--fn-display);font-size:16px;font-weight:700;margin-bottom:6px;}
    .locked-sub{font-size:13px;color:var(--txt2);}
    .btn-login{display:inline-block;margin-top:14px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
    .pill{display:inline-block;font-family:var(--fn-mono);font-size:9px;text-transform:uppercase;letter-spacing:.8px;padding:3px 9px;border-radius:100px;}
    .pill-blue{background:rgba(79,142,247,.12);color:var(--blue);border:1px solid rgba(79,142,247,.25);}
    .pill-green{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2);}
    .pill-orange{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2);}
    .pill-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
    .pill-yellow{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.25);}
    #rewardPopup{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px);}
    .reward-inner{background:linear-gradient(145deg,#0d1220,#111827);border:1px solid rgba(79,142,247,.35);border-radius:20px;padding:36px 32px;max-width:420px;width:92%;text-align:center;box-shadow:0 0 60px rgba(79,142,247,.2);}
    @keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .reward-inner{animation:cardIn .35s cubic-bezier(.34,1.56,.64,1);}
    .rw-emoji{font-size:3rem;margin-bottom:8px;}
    .rw-title{font-family:var(--fn-display);font-size:1.5rem;font-weight:800;margin-bottom:6px;}
    .rw-sub{font-size:13px;color:var(--txt2);margin-bottom:16px;}
    .rw-stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
    .rw-pill{padding:7px 16px;border-radius:100px;font-family:var(--fn-mono);font-size:12px;font-weight:600;}
    .rw-xp{background:rgba(79,142,247,.15);color:var(--blue);border:1px solid rgba(79,142,247,.3);}
    .rw-coin{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.3);}
    .rw-streak{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.3);}
    .rw-badge{font-size:13px;color:var(--yellow);margin:6px 0;}
    .rw-bar-outer{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin:10px 0 4px;}
    .rw-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width 1s ease;}
    .rw-bar-lbl{font-family:var(--fn-mono);font-size:10px;color:var(--txt3);}
    .level-up-banner{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(251,146,60,.1));border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:10px 16px;margin:10px 0;font-family:var(--fn-display);font-weight:700;color:var(--yellow);}
    .rw-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fn-display);margin-top:10px;transition:all .2s;}
    .rw-btn:hover{background:#3a7de8;transform:translateY(-2px);}
    .skel{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    #toastContainer{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
    @keyframes fadeIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    @media(max-width:900px){.page{grid-template-columns:1fr;}.challenge-list{height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);}.challenge-detail{padding:16px;}}
    @media(max-width:768px){
      .main-area{margin-left:0!important;}
      .sidebar{transform:translateX(-100%);}
      .sidebar.show{transform:translateX(0);}
      .close-btn{display:flex!important;}
      .io-grid{grid-template-columns:1fr;}
    }
</style>
</head>

        <div class="streak-lbl">Streak Aktif</div>
      </div>
    </div>
    <div class="sb-user" onclick="window.location.href='profile.html'">
      <div class="avatar-sm" id="navAvatar">?</div>
      <span class="sb-username" id="navUsername">Guest</span>
    </div>
    <button class="btn-danger-sm" id="navLogoutBtn" style="display:none;" onclick="logout()">Keluar</button>
  </div>
</nav>

<!-- ═══════════ MAIN ═══════════ -->
<div class="main-area" id="mainArea">
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-title">⚡ Tantangan</div>
    <div class="topbar-right">
      <span class="coins-badge" id="navCoins" style="display:none;">🪙 0</span>
      <span class="xp-badge" id="navXP">⚡ 0 XP</span>
      <div class="avatar-sm" id="topbarAvatar" style="width:32px;height:32px;font-size:13px;cursor:pointer;" onclick="window.location.href='profile.html'">?</div>
    </div>
  </header>

  <div class="page">
    <div class="challenge-list">
      <div class="list-header">
        <div class="list-title">⚡ Tantangan Coding</div>
        <div class="filter-tabs">
          <button class="ftab active" onclick="filterTingkat('semua', this)">Semua</button>
          <button class="ftab f-mudah" onclick="filterTingkat('mudah', this)">Mudah</button>
          <button class="ftab f-menengah" onclick="filterTingkat('menengah', this)">Menengah</button>
          <button class="ftab f-sulit" onclick="filterTingkat('sulit', this)">Sulit</button>
        </div>
      </div>
      <div id="challengeListEl">
        <div class="ch-item"><div class="skel" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div><div style="flex:1;"><div class="skel" style="height:14px;margin-bottom:6px;"></div><div class="skel" style="height:10px;width:60%;"></div></div></div>
        <div class="ch-item"><div class="skel" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div><div style="flex:1;"><div class="skel" style="height:14px;margin-bottom:6px;"></div><div class="skel" style="height:10px;width:60%;"></div></div></div>
        <div class="ch-item"><div class="skel" style="width:36px;height:36px;border-radius:9px;flex-shrink:0;"></div><div style="flex:1;"><div class="skel" style="height:14px;margin-bottom:6px;"></div><div class="skel" style="height:10px;width:60%;"></div></div></div>
      </div>
    </div>

    <div class="challenge-detail" id="challengeDetail">
      <div class="detail-empty">
        <div class="detail-empty-icon">⚡</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px;">Pilih Tantangan</div>
        <div style="font-size:13px;">Klik salah satu tantangan di sebelah kiri untuk mulai coding</div>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>

const API = "http://127.0.0.1:8000";

let semuaChallenge    = [];
let filteredChallenge = [];
let challengeAktif    = null;
let outputTerakhir    = "";
let sudahRunKode      = false;

/* ════════════════════════════════════════
   SIDEBAR — identik dengan index.html
════════════════════════════════════════ */
let sidebarOpen = true;

function toggleSidebar() {
  if (window.innerWidth > 768) return;
  sidebarOpen = !sidebarOpen;
  applySidebar();
}
function tutupSidebar() {
  if (window.innerWidth > 768) return;
  sidebarOpen = false;
  applySidebar();
}
function applySidebar() {
  const sb  = document.getElementById("sidebar");
  const ma  = document.getElementById("mainArea");
  const ov  = document.getElementById("overlay");
  const mob = window.innerWidth <= 768;
  if (!mob) {
    sb.classList.remove("hidden"); sb.classList.add("show");
    ov.classList.remove("show");
    ma.classList.remove("full"); ma.style.marginLeft = "220px";
    document.getElementById("closeSidebarBtn").style.display = "none";
  } else {
    document.getElementById("closeSidebarBtn").style.display = "flex";
    if (sidebarOpen) {
      sb.classList.remove("hidden"); sb.classList.add("show");
      ov.classList.add("show"); ma.classList.add("full");
    } else {
      sb.classList.add("hidden"); sb.classList.remove("show");
      ov.classList.remove("show"); ma.classList.remove("full");
    }
  }
}
window.addEventListener("resize", () => { sidebarOpen = window.innerWidth > 768; applySidebar(); });

/* ════════════════════════════════════════
   UPDATE NAV USER — identik dengan index.html
════════════════════════════════════════ */
function updateNavUser() {
  const user     = getUser();
  const loggedIn = sudahLogin();
  document.getElementById("navLoginLi").style.display   = loggedIn ? "none" : "";
  document.getElementById("navProfilLi").style.display  = loggedIn ? "" : "none";
  document.getElementById("navLogoutBtn").style.display = loggedIn ? "" : "none";
  if (!user) return;
  document.getElementById("navUsername").textContent = user.username;
  document.getElementById("navStreak").textContent   = `${user.streak_days ?? 0} Hari`;
  document.getElementById("navXP").textContent       = `⚡ ${user.xp ?? 0} XP`;
  const navCoins = document.getElementById("navCoins");
  if (navCoins) { navCoins.textContent = `🪙 ${user.coins ?? 0}`; navCoins.style.display = loggedIn ? "" : "none"; }
  const streakWrap = document.getElementById("streakWrap");
  if (streakWrap) streakWrap.style.display = (user.streak_days > 0) ? "flex" : "none";
  const inisial = user.username.charAt(0).toUpperCase();
  document.getElementById("navAvatar").textContent    = inisial;
  document.getElementById("topbarAvatar").textContent = inisial;
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
function tampilToast(pesan, tipe = "info", dur = 3500) {
  const c = document.getElementById("toastContainer");
  const el = document.createElement("div");
  const w  = tipe==="success"?"#34d399":tipe==="error"?"#f87171":tipe==="warning"?"#fb923c":"#4f8ef7";
  el.style.cssText = `background:#111827;border:1px solid ${w}33;border-left:3px solid ${w};color:${w};padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:fadeIn .2s ease;`;
  el.textContent = pesan; c.appendChild(el);
  setTimeout(() => { el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); }, dur);
}

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function escHtml(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function authHeaders() {
  const t = localStorage.getItem("jcl_token");
  return t ? {"Authorization":`Bearer ${t}`,"Content-Type":"application/json"} : {"Content-Type":"application/json"};
}
function normOutput(s) {
  return (s||"").trim().split("\n").map(l=>l.trim().toLowerCase()).filter(l=>l).join("\n");
}
function handleTab(e) {
  if (e.key==="Tab") { e.preventDefault(); const t=e.target,s=t.selectionStart; t.value=t.value.substring(0,s)+"    "+t.value.substring(t.selectionEnd); t.selectionStart=t.selectionEnd=s+4; }
}
function tingkatConfig(t) {
  return t==="mudah"    ? {pill:"pill-green",  icon:"🟢", label:"Mudah"}    :
         t==="menengah" ? {pill:"pill-orange", icon:"🟡", label:"Menengah"} :
                          {pill:"pill-red",    icon:"🔴", label:"Sulit"};
}
function hitungLevel(xp) {
  const t=[0,100,250,450,700,1000,1350,1750,2200,2700,3250]; let l=1;
  for(let i=0;i<t.length;i++){if(xp>=t[i])l=i+1;else break;} return l;
}

/* ════════════════════════════════════════
   MUAT & RENDER CHALLENGE LIST
════════════════════════════════════════ */
async function muatChallenge() {
  try {
    const token = localStorage.getItem("jcl_token");
    const res   = await fetch(`${API}/challenges`, {headers: token?{"Authorization":`Bearer ${token}`}:{}});
    semuaChallenge = filteredChallenge = await res.json();
    renderList(filteredChallenge);
  } catch(e) {
    document.getElementById("challengeListEl").innerHTML =
      `<div style="padding:20px;text-align:center;color:var(--red);font-size:13px;">❌ Gagal memuat. Pastikan backend berjalan.</div>`;
  }
}

function renderList(list) {
  const el = document.getElementById("challengeListEl");
  if (!list.length) { el.innerHTML=`<div style="padding:32px;text-align:center;color:var(--txt3);font-size:13px;">Belum ada tantangan tersedia.</div>`; return; }
  el.innerHTML = list.map(c => {
    const cfg   = tingkatConfig(c.tingkat);
    const aktif = challengeAktif && challengeAktif.id === c.id;
    return `
      <div class="ch-item ${c.selesai?"selesai":""} ${aktif?"active":""}" onclick="${c.terkunci?"bukaLogin()":"pilihChallenge("+c.id+")"}">
        <div class="ch-icon">${c.terkunci?"🔒":c.selesai?"✅":cfg.icon}</div>
        <div class="ch-info">
          <div class="ch-title">${escHtml(c.judul)}</div>
          <div class="ch-meta">
            <span class="pill ${cfg.pill}">${cfg.label}</span>
            <span class="ch-xp">+${c.xp_reward} XP</span>
            ${c.coin_reward?`<span class="ch-xp">+${c.coin_reward} 🪙</span>`:""}
          </div>
        </div>
        ${c.selesai?`<div class="check-mark"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`:""}
      </div>`;
  }).join("");
}

function filterTingkat(tingkat, btn) {
  document.querySelectorAll(".ftab").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  filteredChallenge = tingkat==="semua" ? semuaChallenge : semuaChallenge.filter(c=>c.tingkat===tingkat);
  renderList(filteredChallenge);
}

/* ════════════════════════════════════════
   PILIH & RENDER DETAIL
════════════════════════════════════════ */
async function pilihChallenge(id) {
  try {
    const token = localStorage.getItem("jcl_token");
    const res   = await fetch(`${API}/challenge/${id}`, {headers: token?{"Authorization":`Bearer ${token}`}:{}});
    if (!res.ok) { const err=await res.json(); if(res.status===403){bukaLogin();return;} tampilToast(err.detail||"Gagal","error"); return; }
    challengeAktif = await res.json();
    renderList(filteredChallenge);
    renderDetail(challengeAktif);
  } catch(e) { tampilToast("Gagal memuat soal: "+e.message,"error"); }
}

function renderDetail(ch) {
  const cfg      = tingkatConfig(ch.tingkat);
  const loggedIn = sudahLogin();
  if (!loggedIn && ch.id > 1) {
    document.getElementById("challengeDetail").innerHTML = `
      <div class="locked-banner">
        <div class="locked-icon">🔒</div>
        <div class="locked-title">Login untuk Mengakses</div>
        <div class="locked-sub">Daftarkan akun gratis untuk mengerjakan semua tantangan dan melacak progressmu.</div>
        <a href="login.html" class="btn-login">Masuk / Daftar</a>
      </div>`; return;
  }
  document.getElementById("challengeDetail").innerHTML = `
    <div class="detail-header">
      <div class="detail-badge-row">
        <span class="pill ${cfg.pill}">${cfg.icon} ${cfg.label}</span>
        <span class="pill pill-blue">+${ch.xp_reward} XP</span>
        ${ch.coin_reward?`<span class="pill pill-yellow">+${ch.coin_reward} 🪙 Coins</span>`:""}
      </div>
      <div class="detail-title">${escHtml(ch.judul)}</div>
      <div class="detail-desc">${escHtml(ch.deskripsi)}</div>
    </div>
    ${ch.selesai?`<div class="selesai-banner"><div class="selesai-icon">✅</div><div><div class="selesai-title">Tantangan Selesai!</div><div class="selesai-sub">Kamu sudah menyelesaikan tantangan ini. Coba lagi untuk latihan!</div></div></div>`:""}
    ${(ch.contoh_input||ch.contoh_output)?`<div class="io-grid">
      ${ch.contoh_input?`<div class="io-box"><div class="io-lbl">Contoh Input</div><pre>${escHtml(ch.contoh_input)}</pre></div>`:""}
      ${ch.contoh_output?`<div class="io-box"><div class="io-lbl">Contoh Output</div><pre>${escHtml(ch.contoh_output)}</pre></div>`:""}
    </div>`:""}
    <div class="editor-section">
      <div class="editor-hdr">
        <div class="editor-hdr-left">
          <div class="editor-dots">
            <div class="editor-dot" style="background:#ff5f56;"></div>
            <div class="editor-dot" style="background:#ffbd2e;"></div>
            <div class="editor-dot" style="background:#27c93f;"></div>
          </div>
          <span>solution.py</span>
        </div>
        <button onclick="resetKode()" class="btn-reset" style="font-size:11px;padding:4px 10px;">↺ Reset</button>
      </div>
      <textarea id="codeEditor" class="code-editor" spellcheck="false" onkeydown="handleTab(event)">${escHtml(ch.kode_awal||"# Tulis solusi kamu di sini\n")}</textarea>
      <div class="output-section">
        <div class="output-lbl">Output</div>
        <div class="output-content" id="outputContent">Klik ▶ Jalankan untuk melihat output...</div>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn-run" id="btnRun" onclick="jalankanKode()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Jalankan
      </button>
      ${!ch.selesai&&loggedIn?`<button class="btn-submit" id="btnSubmit" onclick="kumpulkan()" disabled>✓ Kumpulkan</button>`:""}
      <span class="waktu-info" id="waktuInfo"></span>
    </div>`;
}

/* ════════════════════════════════════════
   JALANKAN KODE
════════════════════════════════════════ */
async function jalankanKode() {
  const kode = document.getElementById("codeEditor")?.value?.trim();
  if (!kode) { tampilToast("Tulis kode dulu!","info"); return; }
  const btnRun=document.getElementById("btnRun"), outputEl=document.getElementById("outputContent"), btnSubmit=document.getElementById("btnSubmit");
  btnRun.disabled=true; btnRun.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg> Menjalankan...';
  outputEl.textContent="⏳ Menjalankan kode..."; outputEl.style.color="var(--orange)";
  try {
    const res=await fetch(`${API}/run-code`,{method:"POST",headers:authHeaders(),body:JSON.stringify({kode})});
    const data=await res.json();
    if(data.error){ outputEl.textContent=data.error; outputEl.style.color="var(--red)"; outputTerakhir=""; sudahRunKode=false; }
    else {
      outputEl.textContent=data.output||"(tidak ada output)"; outputEl.style.color="var(--txt2)";
      outputTerakhir=data.output||""; sudahRunKode=true;
      if(data.waktu_eksekusi){ const w=document.getElementById("waktuInfo"); if(w) w.textContent=`⏱ ${data.waktu_eksekusi}s`; }
      if(challengeAktif&&btnSubmit){
        const cocok=normOutput(outputTerakhir)===normOutput(challengeAktif.contoh_output);
        btnSubmit.disabled=!cocok;
        if(cocok) tampilToast("✅ Output sesuai! Klik Kumpulkan.","success");
        else      tampilToast("❌ Output belum sesuai. Coba lagi!","warning");
      }
    }
  } catch(e){ outputEl.textContent="Gagal terhubung ke backend: "+e.message; outputEl.style.color="var(--red)"; }
  btnRun.disabled=false; btnRun.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Jalankan';
}

/* ════════════════════════════════════════
   KUMPULKAN (SUBMIT)
════════════════════════════════════════ */
async function kumpulkan() {
  if(!challengeAktif){tampilToast("Pilih tantangan dulu!","warning");return;}
  if(!sudahRunKode){tampilToast("Jalankan kode dulu!","warning");return;}
  if(normOutput(outputTerakhir)!==normOutput(challengeAktif.contoh_output)){tampilToast("Output belum sesuai.","warning");return;}
  const btnSubmit=document.getElementById("btnSubmit");
  if(btnSubmit){btnSubmit.disabled=true;btnSubmit.textContent="Mengumpulkan...";}
  try {
    const res=await fetch(`${API}/challenge/${challengeAktif.id}/selesai`,{method:"POST",headers:authHeaders()});
    const data=await res.json();
    if(!res.ok){tampilToast(data.detail||"Gagal","error");if(btnSubmit){btnSubmit.disabled=false;btnSubmit.textContent="✓ Kumpulkan";}return;}
    if(data.sudah_selesai_sebelumnya){tampilToast("Sudah diselesaikan sebelumnya","info");return;}
    const idx=semuaChallenge.findIndex(c=>c.id===challengeAktif.id);
    if(idx>=0) semuaChallenge[idx].selesai=true;
    challengeAktif.selesai=true;
    renderList(filteredChallenge);
    if(typeof updateUserStats==="function") updateUserStats(data.xp_total,data.streak_baru);
    document.getElementById("navXP").textContent=`⚡ ${data.xp_total} XP`;
    const nc=document.getElementById("navCoins"); if(nc&&data.coins_total!==undefined) nc.textContent=`🪙 ${data.coins_total}`;
    tampilkanReward(data);
  } catch(e){tampilToast("Gagal terhubung: "+e.message,"error");if(btnSubmit){btnSubmit.disabled=false;btnSubmit.textContent="✓ Kumpulkan";}}
}

/* ════════════════════════════════════════
   POPUP REWARD
════════════════════════════════════════ */
function tampilkanReward(data) {
  const lama=document.getElementById("rewardPopup"); if(lama) lama.remove();
  const levelInfo=data.level_sekarang?data:null;
  const xpDiLevel=levelInfo?(data.xp_total-data.xp_untuk_level_ini):0;
  const xpRange=levelInfo?(data.xp_untuk_naik_level-data.xp_untuk_level_ini):1;
  const persen=levelInfo?Math.min(Math.round(xpDiLevel/xpRange*100),100):0;
  const popup=document.createElement("div"); popup.id="rewardPopup";
  popup.innerHTML=`
    <div class="reward-inner">
      <div class="rw-emoji">${data.naik_level?"🎊":"🎉"}</div>
      <div class="rw-title">${data.naik_level?"Level Naik!":"Tantangan Selesai!"}</div>
      <div class="rw-sub">${escHtml(challengeAktif?.judul||"")}</div>
      <div class="rw-stats">
        <span class="rw-pill rw-xp">+${data.xp_diperoleh} XP</span>
        ${data.coin_diperoleh?`<span class="rw-pill rw-coin">+${data.coin_diperoleh} 🪙</span>`:""}
        ${data.streak_baru?`<span class="rw-pill rw-streak">🔥 ${data.streak_baru} hari streak</span>`:""}
      </div>
      ${data.badge_baru?.length?`<div class="rw-badge">🏅 Badge baru: ${data.badge_baru.map(b=>`${b.ikon} ${b.nama}`).join(", ")}</div>`:""}
      ${data.naik_level?`<div class="level-up-banner">⭐ Selamat! Kamu naik ke Level ${data.level_sekarang}!</div>`:""}
      ${levelInfo?`<div style="font-size:11px;color:var(--txt3);font-family:var(--fn-mono);margin-bottom:4px;">Level ${data.level_sekarang} — Progress</div>
      <div class="rw-bar-outer"><div class="rw-bar-fill" id="rwBarFill" style="width:0%"></div></div>
      <div class="rw-bar-lbl">${xpDiLevel} / ${xpRange} XP ke Level ${data.level_berikutnya}</div>`:""}
      ${data.penjelasan?`<div style="margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;font-family:var(--fn-mono);font-size:12px;color:var(--txt2);text-align:left;">📋 Solusi: <code>${escHtml(data.penjelasan)}</code></div>`:""}
      <button class="rw-btn" onclick="tutupReward()">Lanjutkan ➔</button>
    </div>`;
  document.body.appendChild(popup);
  setTimeout(()=>{const b=document.getElementById("rwBarFill");if(b) b.style.width=persen+"%";},100);
}

function tutupReward() { const el=document.getElementById("rewardPopup"); if(el) el.remove(); if(challengeAktif) renderDetail(challengeAktif); }
function resetKode() {
  const ed=document.getElementById("codeEditor"); if(ed&&challengeAktif) ed.value=challengeAktif.kode_awal||"# Tulis solusi kamu di sini\n";
  const out=document.getElementById("outputContent"); if(out){out.textContent="Klik ▶ Jalankan untuk melihat output...";out.style.color="var(--txt2)";}
  outputTerakhir=""; sudahRunKode=false;
  const bs=document.getElementById("btnSubmit"); if(bs) bs.disabled=true;
}
function bukaLogin() { window.location.href="login.html"; }

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", async () => {
  sidebarOpen = window.innerWidth > 768;
  applySidebar();
  updateNavUser();
  if (sudahLogin()) {
    try { const p=await ApiUser.getProfil(); if(typeof updateUserStats==="function") updateUserStats(p.xp,p.streak_days); updateNavUser(); } catch(_){}
  }
  await muatChallenge();
  const params=new URLSearchParams(window.location.search);
  const idParam=parseInt(params.get("id"));
  if(idParam) pilihChallenge(idParam);
});
</script>
</body>
</html>
