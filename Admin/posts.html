<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moderasi Komunitas — JCL Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sb-brand"><div class="brand-icon">&lt;/&gt;</div><div><div class="brand-name">JCL Admin</div><div class="brand-sub">Control Panel</div></div></div>
    <nav class="sb-nav">
      <a href="dashboard.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="lessons.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Pelajaran</a>
      <a href="challenges.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Tantangan</a>
      <a href="users.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Pengguna</a>
      <a href="posts.html" class="sb-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Komunitas</a>
      <div class="sb-divider"></div>
      <a href="../Frontend/index.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Lihat Site</a>
      <button class="sb-link sb-logout" onclick="adminLogout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Keluar</button>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title">Moderasi Komunitas</div>
      <div class="topbar-admin" id="adminName">Admin</div>
    </header>

    <div class="admin-content">
      <div class="toolbar">
        <div class="section-title" style="margin:0;flex:1;">Daftar Post</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" id="filterSemua" onclick="setFilter('semua')" style="background:rgba(79,142,247,.12);color:#4f8ef7;border:1px solid rgba(79,142,247,.2);">Semua</button>
          <button class="btn btn-sm" id="filterAktif" onclick="setFilter('aktif')">Aktif</button>
          <button class="btn btn-sm" id="filterHidden" onclick="setFilter('tersembunyi')">Tersembunyi</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="admin-table">
          <thead><tr><th>#</th><th>Judul</th><th>Penulis</th><th>Likes</th><th>Komentar</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead>
          <tbody id="postBody">
            <tr><td colspan="8"><div class="skel" style="height:40px;margin:10px;"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div id="paginasiPost"></div>
    </div>
  </main>
</div>

<!-- Modal Hapus -->
<div class="modal-overlay" id="modalHapus">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title">Hapus Post</div>
    <p style="color:var(--txt2);font-size:14px;">Yakin hapus post <strong id="hapusNama"></strong> secara permanen?</p>
    <input type="hidden" id="hapusId"/>
    <div class="modal-footer">
      <button class="btn btn-warning" onclick="tutupModal('modalHapus')">Batal</button>
      <button class="btn btn-danger" onclick="konfirmasiHapus()">Ya, Hapus</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>
<script src="admin.js"></script>
<script>
let currentPage = 1, currentFilter = "semua";
const PER_HALAMAN = 20;

document.addEventListener("DOMContentLoaded", async () => {
  requireAdmin();
  document.getElementById("adminName").textContent = getAdminName();
  await muatPosts(1, "semua");
});

function setFilter(filter) {
  currentFilter = filter;
  ["filterSemua","filterAktif","filterHidden"].forEach(id => {
    const btn = document.getElementById(id);
    btn.style.cssText = "";
  });
  const aktifStyle = "background:rgba(79,142,247,.12);color:#4f8ef7;border:1px solid rgba(79,142,247,.2);";
  const map = { semua:"filterSemua", aktif:"filterAktif", tersembunyi:"filterHidden" };
  document.getElementById(map[filter]).style.cssText = aktifStyle;
  muatPosts(1, filter);
}

async function muatPosts(halaman, tampilkan) {
  currentPage = halaman;
  try {
    const params = new URLSearchParams({ halaman, per_halaman: PER_HALAMAN, tampilkan });
    const data = await adminFetch(`/admin/posts?${params}`);
    renderTabel(data.posts);
    renderPagination("paginasiPost", halaman, data.total, PER_HALAMAN, "goPaginasiPost");
  } catch (e) { tampilToast("Gagal: " + e.message, "error"); }
}

function renderTabel(list) {
  const tbody = document.getElementById("postBody");
  if (!list || list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">💬</div>Tidak ada post.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((p, i) => `
    <tr>
      <td style="color:var(--txt3);font-family:var(--fn-mono);font-size:11px;">${(currentPage-1)*PER_HALAMAN+i+1}</td>
      <td>
        <div style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(p.judul)}</div>
        ${p.kode_snippet ? '<span class="pill pill-blue" style="margin-top:4px;">code</span>' : ""}
      </td>
      <td style="color:var(--txt2);">@${escHtml(p.penulis)}</td>
      <td style="color:var(--txt2);">❤️ ${p.jumlah_like}</td>
      <td style="color:var(--txt2);">💬 ${p.jumlah_komentar}</td>
      <td>${p.is_hidden ? '<span class="pill pill-red">Tersembunyi</span>' : '<span class="pill pill-green">Aktif</span>'}</td>
      <td style="color:var(--txt3);font-size:12px;">${formatTanggal(p.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-warning btn-sm" onclick="toggleSembunyikan(${p.id})">${p.is_hidden ? "Tampilkan" : "Sembunyikan"}</button>
        <button class="btn btn-danger btn-sm" onclick="bukaModalHapus(${p.id},'${escHtml(p.judul)}')">Hapus</button>
      </div></td>
    </tr>
  `).join("");
}

async function toggleSembunyikan(id) {
  try {
    const hasil = await adminFetch(`/admin/posts/${id}/sembunyikan`, "PATCH");
    tampilToast(hasil.pesan, "success");
    await muatPosts(currentPage, currentFilter);
  } catch (e) { tampilToast(e.message, "error"); }
}

function bukaModalHapus(id, nama) {
  document.getElementById("hapusId").value = id;
  document.getElementById("hapusNama").textContent = `"${nama}"`;
  bukaModal("modalHapus");
}

async function konfirmasiHapus() {
  const id = document.getElementById("hapusId").value;
  try {
    await adminFetch(`/admin/posts/${id}`, "DELETE");
    tampilToast("Post berhasil dihapus.", "success");
    tutupModal("modalHapus");
    await muatPosts(currentPage, currentFilter);
  } catch (e) { tampilToast(e.message, "error"); }
}

// FIX: fungsi global untuk pagination (dipanggil dari renderPagination)
function goPaginasiPost(p) { muatPosts(p, currentFilter); }
</script>
</body>
</html>
