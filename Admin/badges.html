<div id="toastContainer"></div>
<script src="admin.js"></script>
<script>
const API = "https://jastcodelab-production.up.railway.app";
document.addEventListener("DOMContentLoaded", async () => {
  requireAdmin();
  document.getElementById("adminName").textContent = getAdminName();
  try {
    const data = await adminFetch("/badges/semua");
    document.getElementById("totalBadge").textContent = data.length + " badge terdaftar";
    document.getElementById("badgeGrid").innerHTML = data.map(b => `
      <div class="badge-card">
        <div class="badge-icon">${b.ikon}</div>
        <div>
          <div class="badge-kode">${escHtml(b.kode)}</div>
          <div class="badge-nama">${escHtml(b.nama)}</div>
          <div class="badge-desc">${escHtml(b.deskripsi)}</div>
        </div>
      </div>
    `).join("");
  } catch(e) {
    tampilToast("Gagal memuat badge: "+e.message,"error");
  }
});
function escHtml(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
