<script src="admin.js"></script>
<script>
const API = "https://jastcodelab-production.up.railway.app";

document.addEventListener("DOMContentLoaded", async () => {
  requireAdmin();
  document.getElementById("adminName").textContent = getAdminName();

  try {
    const daily = await adminFetch("/daily");
    renderDailyHero(daily);
  } catch(e) {
    document.getElementById("dailyHero").innerHTML = `<div style="color:#f87171;font-size:13px;">⚠️ Gagal memuat daily challenge: ${e.message}</div>`;
  }

  try {
    // Ambil riwayat dari beberapa user (pakai leaderboard sebagai sampel)
    const lb = await adminFetch("/leaderboard");
    renderRiwayatPlaceholder();
  } catch(e) {}
});

function renderDailyHero(d) {
  const now = new Date();
  const tengahMalam = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
  let sisa = Math.floor((tengahMalam - now) / 1000);
  const jam = Math.floor(sisa/3600); sisa %= 3600;
  const mnt = Math.floor(sisa/60);
  const dtk = sisa % 60;
  const fmt2 = n => String(n).padStart(2,"0");

  const pilColor = {"mudah":"mudah","menengah":"menengah","sulit":"sulit"};

  document.getElementById("dailyHero").innerHTML = `
    <div class="daily-title">☀️ Daily Challenge Hari Ini — ${d.tanggal}</div>
    <div class="daily-judul">${escHtml(d.judul)}</div>
    <div class="daily-meta">
      <span class="pill pill-${pilColor[d.tingkat]||'mudah'}">${d.tingkat}</span>
      &nbsp; Reward: +${d.xp_bonus} XP · +${d.coin_bonus} Coins
    </div>
    <div class="daily-stats">
      <div class="daily-stat">
        <div class="daily-stat-num">${d.total_selesai}</div>
        <div class="daily-stat-lbl">Sudah Selesai</div>
      </div>
      <div class="daily-stat">
        <div class="daily-stat-num">${d.xp_bonus}</div>
        <div class="daily-stat-lbl">Bonus XP</div>
      </div>
      <div class="daily-stat">
        <div class="daily-stat-num">${d.coin_bonus}</div>
        <div class="daily-stat-lbl">Bonus Coins</div>
      </div>
    </div>
    <div style="margin-top:14px;font-size:12px;color:#8b95b0;">Reset dalam: <span class="countdown" id="countdown">${fmt2(jam)}:${fmt2(mnt)}:${fmt2(dtk)}</span></div>
  `;

  // Live countdown
  setInterval(() => {
    const el = document.getElementById("countdown");
    if (!el) return;
    const now2 = new Date();
    const tMalam = new Date(now2.getFullYear(), now2.getMonth(), now2.getDate()+1);
    let s2 = Math.floor((tMalam - now2) / 1000);
    const j = Math.floor(s2/3600); s2 %= 3600;
    const m = Math.floor(s2/60); s2 %= 60;
    el.textContent = `${fmt2(j)}:${fmt2(m)}:${fmt2(s2)}`;
  }, 1000);
}

function renderRiwayatPlaceholder() {
  document.getElementById("riwayatList").innerHTML = `
    <p style="color:#8b95b0;font-size:13px;">
      Riwayat 30 hari terakhir ditampilkan per user. Gunakan endpoint 
      <code style="background:#0d1220;padding:2px 6px;border-radius:4px;color:#4f8ef7;">/daily/riwayat</code> 
      dari akun user untuk melihat riwayat detail.<br><br>
      Daily challenge saat ini berjalan otomatis — sistem memilih challenge acak setiap tengah malam dari tantangan yang sudah dipublish.
    </p>
  `;
}

function escHtml(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
