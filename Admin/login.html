<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — JastCodeLab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: bold;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    h1 {
      font-size: 24px;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error {
      background: #7f1d1d22;
      border: 1px solid #ef444433;
      color: #f87171;
      display: block;
    }

    .alert.success {
      background: #05966922;
      border: 1px solid #10b98133;
      color: #34d399;
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4f8ef7;
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #6b7280;
    }

    .back-link a {
      color: #4f8ef7;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">&lt;/&gt;</div>
      <span class="logo-text">JCL Admin</span>
    </div>

    <h1>Login Admin</h1>
    <p class="subtitle">Masuk ke panel kontrol JastCodeLab</p>

    <div id="alertBox" class="alert"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username admin" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password" />
    </div>

    <button id="btnLogin" onclick="handleLogin()">Masuk</button>

    <div class="back-link">
      <a href="https://endearing-marigold-a93f38.netlify.app">← Kembali ke Frontend</a>
    </div>
  </div>

  <script>
    const API_URL = "https://jastcodelab-production.up.railway.app";
    const TOKEN_KEY = "jcl_token";

    // Cek kalau sudah login
    window.addEventListener("load", () => {
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        try {
          const parts = token.split(".");
          const base64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
          const padded = base64 + "=".repeat((4 - base64.length % 4) % 4);
          const payload = JSON.parse(atob(padded));
          if (payload.is_admin) {
            window.location.href = "/dashboard.html";
            return;
          }
        } catch {}
      }
    });

    async function handleLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("btnLogin");
      const alert = document.getElementById("alertBox");

      alert.className = "alert";
      alert.textContent = "";

      if (!username || !password) {
        alert.className = "alert error";
        alert.textContent = "Username dan password wajib diisi.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Memproses...";

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Username atau password salah");
        }

        if (!data.is_admin) {
          throw new Error("Akun ini bukan admin!");
        }

        // Simpan token
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem("jcl_user", JSON.stringify({
          id: data.user_id,
          username: data.username,
          xp: data.xp ?? 0,
          streak_days: data.streak_days ?? 0,
          is_admin: data.is_admin ?? false,
        }));

        alert.className = "alert success";
        alert.textContent = `✓ Selamat datang, ${data.username}! Menuju dashboard...`;

        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 800);

      } catch (err) {
        alert.className = "alert error";
        alert.textContent = err.message;
        btn.disabled = false;
        btn.textContent = "Masuk";
      }
    }

    // Enter key support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
