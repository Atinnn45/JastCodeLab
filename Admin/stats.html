<!DOCTYPE html>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
  <style>
    .stats-full-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
    @media(max-width:900px){ .stats-full-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:600px){ .stats-full-grid{ grid-template-columns:1fr; } }
    .stat-big { background:#111827; border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:24px; }
    .stat-big-num { font-size:36px; font-weight:800; letter-spacing:-1px; line-height:1; margin-bottom:4px; font-family:'Inter',sans-serif; }
    .stat-big-lbl { font-size:12px; color:#8b95b0; text-transform:uppercase; letter-spacing:.8px; font-family:'Roboto Mono',monospace; }
    .stat-big-icon { font-size:28px; margin-bottom:10px; }
    .leaderboard-wrap { background:#111827; border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:20px; }
    .lb-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .lb-row:last-child { border-bottom:none; }
    .lb-rank { font-family:'Roboto Mono',monospace; font-size:13px; font-weight:700; width:28px; flex-shrink:0; color:#4a5472; }
    .lb-av { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#4f8ef7,#a78bfa); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }
    .lb-info { flex:1; min-width:0; }
    .lb-name { font-size:13px; font-weight:600; color:#e8edf8; }
    .lb-meta { font-size:11px; color:#8b95b0; font-family:'Roboto Mono',monospace; }
    .lb-xp { font-family:'Roboto Mono',monospace; font-size:12px; color:#4f8ef7; font-weight:600; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    @media(max-width:768px){ .two-col{ grid-template-columns:1fr; } }
    .section-card { background:#111827; border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:20px; }
    .section-card-title { font-size:14px; font-weight:600; color:#e8edf8; margin-bottom:14px; display:flex; align-items:center; gap:7px; }
    .row-item { display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:13px; }
    .row-item:last-child { border-bottom:none; }
    .row-item .lbl { color:#8b95b0; }
    .row-item .val { font-weight:600; color:#e8edf8; font-family:'Roboto Mono',monospace; font-size:12px; }
    .sb-section-label { font-size:9px; text-transform:uppercase; letter-spacing:1.2px; color:#4a5472; padding:14px 14px 4px; font-family:'Roboto Mono',monospace; }
  </style>
</head>

<div id="toastContainer"></div>
<script src="admin.js"></script>
<script>
const API = "http://127.0.0.1:8000";

document.addEventListener("DOMContentLoaded", async () => {
  requireAdmin();
  document.getElementById("adminName").textContent = getAdminName();
  try {
    const [stats, lb] = await Promise.all([
      adminFetch("/admin/stats"),
      adminFetch("/leaderboard"),
    ]);
    renderStats(stats);
    renderLeaderboard(lb);
    renderMetrik(stats);
  } catch(e) {
    tampilToast("Gagal memuat data: " + e.message, "error");
  }
});

function renderStats(s) {
  const items = [
    { icon:"👥", num: s.total_users,          lbl:"Total Pengguna",      color:"#4f8ef7" },
    { icon:"📚", num: s.total_lessons,         lbl:"Total Pelajaran",     color:"#a78bfa" },
    { icon:"⚡", num: s.total_challenges,      lbl:"Total Tantangan",     color:"#fb923c" },
    { icon:"💬", num: s.total_posts,           lbl:"Total Post",          color:"#34d399" },
    { icon:"🏆", num: (s.total_xp_diberikan||0).toLocaleString("id-ID"), lbl:"Total XP Diberikan", color:"#f59e0b" },
    { icon:"🔥", num: s.user_aktif_7_hari,     lbl:"User Aktif 7 Hari",  color:"#f87171" },
  ];
  document.getElementById("statGrid").innerHTML = items.map(i => `
    <div class="stat-big">
      <div class="stat-big-icon">${i.icon}</div>
      <div class="stat-big-num" style="color:${i.color};">${i.num}</div>
      <div class="stat-big-lbl">${i.lbl}</div>
    </div>
  `).join("");
}

function renderLeaderboard(data) {
  const medals = ["🥇","🥈","🥉"];
  document.getElementById("leaderboardList").innerHTML = data.slice(0,10).map((u,i) => `
    <div class="lb-row">
      <span class="lb-rank">${medals[i] || "#"+(i+1)}</span>
      <div class="lb-av">${u.username.charAt(0).toUpperCase()}</div>
      <div class="lb-info">
        <div class="lb-name">${escHtml(u.username)}${u.active_title ? ` <span style="font-size:10px;color:#a78bfa;">${escHtml(u.active_title)}</span>` : ""}</div>
        <div class="lb-meta">🔥 ${u.streak_days} hari · 🪙 ${u.coins||0}</div>
      </div>
      <span class="lb-xp">⚡ ${u.xp} XP</span>
    </div>
  `).join("") || "<p style='color:#4a5472;font-size:13px;'>Belum ada data.</p>";
}

function renderMetrik(s) {
  const rasio = s.total_users > 0 ? Math.round((s.user_aktif_7_hari/s.total_users)*100) : 0;
  const avgXP  = s.total_users > 0 ? Math.round(s.total_xp_diberikan/s.total_users) : 0;
  const items = [
    { lbl:"Rata-rata XP per User",     val: avgXP.toLocaleString("id-ID") + " XP" },
    { lbl:"Rasio User Aktif (7 hari)", val: rasio + "%" },
    { lbl:"Total Konten",              val: (s.total_lessons + s.total_challenges) + " item" },
    { lbl:"Engagement Rate",           val: s.total_posts > 0 && s.total_users > 0 ? (s.total_posts/s.total_users).toFixed(1) + " post/user" : "—" },
    { lbl:"Tantangan vs Pelajaran",    val: s.total_lessons > 0 ? (s.total_challenges/s.total_lessons).toFixed(1) + "x" : "—" },
    { lbl:"Status Server",             val: "🟢 Online" },
  ];
  document.getElementById("metrikList").innerHTML = items.map(i => `
    <div class="row-item">
      <span class="lbl">${i.lbl}</span>
      <span class="val">${i.val}</span>
    </div>
  `).join("");
}

function escHtml(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
