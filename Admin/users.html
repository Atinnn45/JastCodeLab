<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelola Pengguna — JCL Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sb-brand"><div class="brand-icon">&lt;/&gt;</div><div><div class="brand-name">JCL Admin</div><div class="brand-sub">Control Panel</div></div></div>
    <nav class="sb-nav">
      <a href="dashboard.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="lessons.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>Pelajaran</a>
      <a href="challenges.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Tantangan</a>
      <a href="users.html" class="sb-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Pengguna</a>
      <a href="posts.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Komunitas</a>
      <div class="sb-divider"></div>
      <a href="../Frontend/index.html" class="sb-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Lihat Site</a>
      <button class="sb-link sb-logout" onclick="adminLogout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Keluar</button>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-title">Kelola Pengguna</div>
      <div class="topbar-admin" id="adminName">Admin</div>
    </header>

    <div class="admin-content">
      <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="🔍 Cari username atau email..." oninput="handleCari(this.value)"/>
      </div>

      <div class="table-wrap">
        <table class="admin-table">
          <thead><tr><th>#</th><th>Username</th><th>Email</th><th>XP</th><th>Streak</th><th>Role</th><th>Status</th><th>Bergabung</th><th>Aksi</th></tr></thead>
          <tbody id="userBody">
            <tr><td colspan="9"><div class="skel" style="height:40px;margin:10px;"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div id="paginasiUser"></div>
    </div>
  </main>
</div>

<!-- Modal Edit User -->
<div class="modal-overlay" id="modalUser">
  <div class="modal" style="max-width:420px;">
    <div class="modal-title">Edit Pengguna — <span id="modalUserNama"></span></div>
    <input type="hidden" id="editUserId"/>
    <div class="form-group">
      <label class="form-label">XP</label>
      <input class="form-input" id="editUserXP" type="number" min="0"/>
    </div>
    <div class="form-group">
      <label class="form-check"><input type="checkbox" id="editUserAdmin"/> Jadikan Admin</label>
    </div>
    <div class="form-group">
      <label class="form-check"><input type="checkbox" id="editUserBan"/> Ban Pengguna Ini</label>
    </div>
    <div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--txt3);margin-top:4px;">
      ⚠ Pengguna yang di-ban tidak akan muncul di leaderboard.
    </div>
    <div class="modal-footer">
      <button class="btn btn-warning" onclick="tutupModal('modalUser')">Batal</button>
      <button class="btn btn-primary" id="btnSimpanUser" onclick="simpanUser()">Simpan</button>
    </div>
  </div>
</div>

<!-- Modal Hapus -->
<div class="modal-overlay" id="modalHapus">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title">Hapus Pengguna</div>
    <p style="color:var(--txt2);font-size:14px;">Yakin hapus user <strong id="hapusNama"></strong>? Semua data user akan ikut terhapus.</p>
    <input type="hidden" id="hapusId"/>
    <div class="modal-footer">
      <button class="btn btn-warning" onclick="tutupModal('modalHapus')">Batal</button>
      <button class="btn btn-danger" onclick="konfirmasiHapus()">Ya, Hapus Permanen</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>
<script src="admin.js"></script>
<script>
let currentPage = 1, currentCari = "", allUsers = [];
const PER_HALAMAN = 20;

document.addEventListener("DOMContentLoaded", async () => {
  requireAdmin();
  document.getElementById("adminName").textContent = getAdminName();
  await muatUsers(1, "");
});

async function muatUsers(halaman, cari) {
  currentPage = halaman; currentCari = cari;
  try {
    const params = new URLSearchParams({ halaman, per_halaman: PER_HALAMAN, cari });
    const data = await adminFetch(`/admin/users?${params}`);
    allUsers = data.users;
    renderTabel(data.users);
    renderPagination("paginasiUser", halaman, data.total, PER_HALAMAN, "goPaginasiUser");
  } catch (e) { tampilToast("Gagal: " + e.message, "error"); }
}

let cariTimer;
function handleCari(val) {
  clearTimeout(cariTimer);
  cariTimer = setTimeout(() => muatUsers(1, val), 400);
}

function renderTabel(list) {
  const tbody = document.getElementById("userBody");
  if (!list || list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">👥</div>Tidak ada pengguna ditemukan.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map((u, i) => `
    <tr>
      <td style="color:var(--txt3);font-family:var(--fn-mono);font-size:11px;">${(currentPage-1)*PER_HALAMAN+i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">${u.username.charAt(0).toUpperCase()}</div>
          <span style="font-weight:600;">${escHtml(u.username)}</span>
        </div>
      </td>
      <td style="color:var(--txt2);font-size:12px;">${escHtml(u.email)}</td>
      <td><span class="pill pill-blue">${u.xp} XP</span></td>
      <td style="color:var(--txt2);">🔥 ${u.streak_days}</td>
      <td>${u.is_admin ? '<span class="pill pill-purple">Admin</span>' : '<span class="pill pill-gray">User</span>'}</td>
      <td>${u.is_banned ? '<span class="pill pill-red">Banned</span>' : '<span class="pill pill-green">Aktif</span>'}</td>
      <td style="color:var(--txt3);font-size:12px;">${formatTanggal(u.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-success btn-sm" onclick="bukaModalEdit(${u.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="bukaModalHapus(${u.id},'${escHtml(u.username)}')">Hapus</button>
      </div></td>
    </tr>
  `).join("");
}

function bukaModalEdit(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  document.getElementById("editUserId").value = u.id;
  document.getElementById("modalUserNama").textContent = u.username;
  document.getElementById("editUserXP").value = u.xp;
  document.getElementById("editUserAdmin").checked = u.is_admin;
  document.getElementById("editUserBan").checked = u.is_banned;
  bukaModal("modalUser");
}

async function simpanUser() {
  const id = document.getElementById("editUserId").value;
  const btn = document.getElementById("btnSimpanUser");
  const payload = {
    xp: parseInt(document.getElementById("editUserXP").value),
    is_admin: document.getElementById("editUserAdmin").checked,
    is_banned: document.getElementById("editUserBan").checked,
  };
  btn.disabled = true; btn.textContent = "Menyimpan...";
  try {
    await adminFetch(`/admin/users/${id}`, "PATCH", payload);
    tampilToast("Pengguna berhasil diperbarui!", "success");
    tutupModal("modalUser");
    await muatUsers(currentPage, currentCari);
  } catch (e) { tampilToast(e.message, "error"); }
  btn.disabled = false; btn.textContent = "Simpan";
}

function bukaModalHapus(id, nama) {
  document.getElementById("hapusId").value = id;
  document.getElementById("hapusNama").textContent = `"${nama}"`;
  bukaModal("modalHapus");
}

async function konfirmasiHapus() {
  const id = document.getElementById("hapusId").value;
  try {
    await adminFetch(`/admin/users/${id}`, "DELETE");
    tampilToast("Pengguna berhasil dihapus.", "success");
    tutupModal("modalHapus");
    await muatUsers(currentPage, currentCari);
  } catch (e) { tampilToast(e.message, "error"); }
}

// FIX: fungsi global untuk pagination (dipanggil dari renderPagination)
function goPaginasiUser(p) { muatUsers(p, currentCari); }
</script>
</body>
</html>
