    .sb-section-label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#4a5472;padding:14px 14px 4px;font-family:'Roboto Mono',monospace;}
    .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
    .shop-card{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px;transition:border-color .15s;}
    .shop-card:hover{border-color:rgba(251,191,36,.3);}
    .shop-card-icon{font-size:2.2rem;margin-bottom:10px;}
    .shop-card-nama{font-size:14px;font-weight:700;color:#e8edf8;margin-bottom:4px;}
    .shop-card-desc{font-size:12px;color:#8b95b0;margin-bottom:10px;}
    .shop-card-footer{display:flex;align-items:center;justify-content:space-between;}
    .shop-card-harga{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;color:#fbbf24;}
    .shop-card-tipe{font-size:10px;font-family:'Roboto Mono',monospace;padding:2px 8px;border-radius:100px;background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);}
    .stat-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .stat-mini{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px 20px;flex:1;min-width:120px;text-align:center;}
    .stat-mini-num{font-size:28px;font-weight:800;color:#fbbf24;font-family:'Inter',sans-serif;}
    .stat-mini-lbl{font-size:11px;color:#8b95b0;font-family:'Roboto Mono',monospace;text-transform:uppercase;}
  </style>

<div id="toastContainer"></div>
<script src="admin.js"></script>
<script>
const API = "https://jastcodelab-production.up.railway.app";
document.addEventListener("DOMContentLoaded", async () => {
  requireAdmin();
  document.getElementById("adminName").textContent = getAdminName();
  try {
    const data = await adminFetch("/shop");
    const items = data.items || [];
    const totalHarga = items.reduce((s,i)=>s+i.harga_coins,0);
    const avgHarga = items.length ? Math.round(totalHarga/items.length) : 0;

    document.getElementById("shopStats").innerHTML = `
      <div class="stat-mini"><div class="stat-mini-num">${items.length}</div><div class="stat-mini-lbl">Total Item</div></div>
      <div class="stat-mini"><div class="stat-mini-num">${avgHarga}</div><div class="stat-mini-lbl">Rata-rata Harga</div></div>
      <div class="stat-mini"><div class="stat-mini-num">${Math.min(...items.map(i=>i.harga_coins))||0} – ${Math.max(...items.map(i=>i.harga_coins))||0}</div><div class="stat-mini-lbl">Rentang Harga</div></div>
    `;

    document.getElementById("shopGrid").innerHTML = items.map(i => `
      <div class="shop-card">
        <div class="shop-card-icon">${i.ikon}</div>
        <div class="shop-card-nama">${escHtml(i.nama)}</div>
        <div class="shop-card-desc">${escHtml(i.deskripsi)}</div>
        <div class="shop-card-footer">
          <span class="shop-card-harga">🪙 ${i.harga_coins}</span>
          <span class="shop-card-tipe">${i.tipe}</span>
        </div>
      </div>
    `).join("");
  } catch(e) {
    tampilToast("Gagal memuat shop: "+e.message,"error");
  }
});
function escHtml(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
